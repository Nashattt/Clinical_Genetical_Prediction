{% extends 'base.html' %}

{% block content %}
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">
          <span class="medical-cross">⚕️</span>
          <span class="hack-bracket">[</span>
          <span class="logo-text">MedHack</span>
          <span class="hack-bracket">]</span>
          <span class="cursor">_</span>
        </div>
        <p class="tagline">Survival Risk Intelligence</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <div id="loginTab" class="auth-form active">
        <h2>Access Terminal</h2>
        <input type="email" id="loginEmail" placeholder="email@domain.com" class="auth-input" />
        <input type="password" id="loginPassword" placeholder="password" class="auth-input" />
        <button id="loginBtn" class="auth-btn">Authenticate <span class="blink">⨠</span></button>
      </div>

      <div id="signupTab" class="auth-form">
        <h2>Create Profile</h2>
        <input type="email" id="signupEmail" placeholder="email@domain.com" class="auth-input" />
        <input type="password" id="signupPassword" placeholder="password" class="auth-input" />
        <button id="signupBtn" class="auth-btn">Initialize <span class="blink">⨠</span></button>
      </div>

      <div class="auth-divider">
        <span>or</span>
      </div>

      <button id="googleBtn" class="google-auth-btn"><span class="google-icon">G</span> Continue with Google</button>

      <div id="authMessage" class="auth-message"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script>
    // Your web app's Firebase configuration
    
    const firebaseConfig = {
      apiKey: 'AIzaSyBrFwAlUV-zenHDuBx3qLqJLjUuroPnNSA',
      authDomain: 'dna-scan.firebaseapp.com',
      projectId: 'dna-scan',
      storageBucket: 'dna-scan.firebasestorage.app',
      messagingSenderId: '656038016719',
      appId: '1:656038016719:web:e4071d52050eb4626ea9ba'
    }
    
    firebase.initializeApp(firebaseConfig)
    const auth = firebase.auth()
    
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab
        document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'))
        btn.classList.add('active')
        document.getElementById('loginTab').classList.toggle('active', tab === 'login')
        document.getElementById('signupTab').classList.toggle('active', tab === 'signup')
      })
    })
    
    function showMessage(msg, isError = true) {
      const msgDiv = document.getElementById('authMessage')
      msgDiv.textContent = msg
      msgDiv.className = `auth-message ${isError ? 'error' : 'success'}`
      setTimeout(() => {
        msgDiv.className = 'auth-message'
        msgDiv.textContent = ''
      }, 4000)
    }
    
    async function sendTokenToBackend(user) {
      const token = await user.getIdToken()
      const response = await fetch('/api/verify_token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id_token: token })
      })
      const data = await response.json()
      if (data.success) {
        // Check if profile is complete
        const profileCheck = await fetch('/api/check_profile')
        const profileData = await profileCheck.json()
        if (profileData.profile_complete) {
          window.location.href = '/dashboard'
        } else {
          window.location.href = '/profile_setup'
        }
      } else {
        showMessage('Authentication failed: ' + data.error)
      }
    }
    
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value
      const password = document.getElementById('loginPassword').value
      try {
        const cred = await auth.signInWithEmailAndPassword(email, password)
        await sendTokenToBackend(cred.user)
      } catch (error) {
        showMessage(error.message)
      }
    })
    
    document.getElementById('signupBtn').addEventListener('click', async () => {
      const email = document.getElementById('signupEmail').value
      const password = document.getElementById('signupPassword').value
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password)
        await sendTokenToBackend(cred.user)
      } catch (error) {
        showMessage(error.message)
      }
    })
    
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider()
      try {
        const result = await auth.signInWithPopup(provider)
        await sendTokenToBackend(result.user)
      } catch (error) {
        showMessage(error.message)
      }
    })
  </script>
{% endblock %}
