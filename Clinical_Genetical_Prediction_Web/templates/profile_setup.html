{% extends "base.html" %}

{% block content %}
<div class="profile-container">
    <div class="profile-card glass">
        <div class="logo">
            <span class="medical-cross">⚕️</span>
            <span class="hack-bracket">[</span>
            <span class="logo-text">MedHack</span>
            <span class="hack-bracket">]</span>
        </div>
        <h2>Complete Your Profile</h2>
        <p class="subtitle">We need a few more details to personalize your risk assessment.</p>

        <form id="profileForm">
            <div class="input-group">
                <label>Full Name *</label>
                <input type="text" id="name" required class="neo-input" placeholder="e.g., John Doe">
            </div>

            <div class="input-group">
                <label>Date of Birth *</label>
                <input type="date" id="dob" required class="neo-input">
            </div>

            <div class="input-row">
                <div class="input-group half">
                    <label>Height (cm) *</label>
                    <input type="number" id="height" step="0.1" required class="neo-input" placeholder="cm">
                </div>
                <div class="input-group half">
                    <label>Weight (kg) *</label>
                    <input type="number" id="weight" step="0.1" required class="neo-input" placeholder="kg">
                </div>
            </div>

            <div class="input-group">
                <label>Sex *</label>
                <select id="sex" required class="neo-select">
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="input-group">
                <label>Have you had cancer before? *</label>
                <div class="radio-group">
                    <label><input type="radio" name="cancerHistory" value="yes" required> Yes</label>
                    <label><input type="radio" name="cancerHistory" value="no" required> No</label>
                </div>
            </div>

            <button type="submit" class="auth-btn">Save & Continue ⨠</button>
        </form>
        <div id="profileMessage" class="auth-message"></div>
    </div>
</div>

<script>
    const form = document.getElementById('profileForm');
    const messageDiv = document.getElementById('profileMessage');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const payload = {
            name: document.getElementById('name').value,
            date_of_birth: document.getElementById('dob').value,
            height: parseFloat(document.getElementById('height').value),
            weight: parseFloat(document.getElementById('weight').value),
            sex: document.getElementById('sex').value,
            has_cancer_history: document.querySelector('input[name="cancerHistory"]:checked').value === 'yes'
        };

        const response = await fetch('/api/save_profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (data.success) {
            window.location.href = '/dashboard';
        } else {
            messageDiv.textContent = data.error || 'Failed to save profile';
            messageDiv.className = 'auth-message error';
        }
    });
</script>

<style>
.profile-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}
.profile-card {
    background: var(--bg-secondary);
    border-radius: 20px;
    padding: 2rem;
    max-width: 600px;
    width: 100%;
    border: 1px solid var(--accent-green);
}
.input-row {
    display: flex;
    gap: 1rem;
}
.input-group.half {
    flex: 1;
}
.radio-group {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.5rem;
}
.radio-group label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
}
.subtitle {
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    text-align: center;
}
</style>
{% endblock %}
